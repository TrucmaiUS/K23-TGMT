MODEL:
  PRETRAIN_CHOICE: 'imagenet'
  PRETRAIN_PATH: '/home/heshuting/.cache/torch/checkpoints/jx_vit_base_p16_224-80ecf9dd.pth'
  METRIC_LOSS_TYPE: 'triplet'
  IF_LABELSMOOTH: 'off'
  IF_WITH_CENTER: 'no'
  NAME: 'transformer'
  NO_MARGIN: True
  DEVICE_ID: ('5')
  TRANSFORMER_TYPE: 'vit_base_patch16_224_TransReID'
  STRIDE_SIZE: [11, 11]
  SIE_CAMERA: True
  SIE_COE: 3.0
  JPM: True
  RE_ARRANGE: True
  SEM_ALIGN:
    ENABLED: True
    NUM_PARTS: 6
    MASK_DIR: 'semantic_groups'
    MASK_EXT: '.png'
    SCORE_HIDDEN_DIM_RATIO: 4
    REF_HIDDEN_DIM_RATIO: 2
    LAMBDA_ALIGN: 0.0
    LAMBDA_SEP: 0.0
    LAMBDA_BATCH: 0.0
    LAMBDA_PATCH: 0.0
    LAMBDA_PIXEL: 0.1
    SEP_MARGIN: 0.2
    MATCH_TEMPERATURE: 0.07
    EPS: 1e-6
    VISIBLE_THRESHOLD: 1.0
    DETACH_REFERENCE: True
    DETACH_BATCH_PROTOTYPES: True
    FLIP_LABEL_PAIRS: [[3, 4], [5, 6]]
    WARMUP_EPOCHS: 20
    FUSE_GLOBAL: False
    FUSION_HIDDEN_DIM_RATIO: 4
    PATCH_HIDDEN_DIM_RATIO: 4
    PIXEL_DECODER_ENABLED: True
    PIXEL_DECODER_HIDDEN_DIM_RATIO: 4
    PIXEL_LOSS_BG_WEIGHT: 0.25

INPUT:
  SIZE_TRAIN: [256, 128]
  SIZE_TEST: [256, 128]
  PROB: 0.5
  RE_PROB: 0.5
  PADDING: 10
  PIXEL_MEAN: [0.5, 0.5, 0.5]
  PIXEL_STD: [0.5, 0.5, 0.5]

DATASETS:
  NAMES: ('occ_duke')
  ROOT_DIR: ('../../data')

DATALOADER:
  SAMPLER: 'softmax_triplet'
  NUM_INSTANCE: 4
  NUM_WORKERS: 8

SOLVER:
  OPTIMIZER_NAME: 'SGD'
  MAX_EPOCHS: 120
  BASE_LR: 0.004
  IMS_PER_BATCH: 32
  WARMUP_METHOD: 'linear'
  WARMUP_EPOCHS: 10
  LARGE_FC_LR: False
  CHECKPOINT_PERIOD: 5
  LOG_PERIOD: 50
  EVAL_PERIOD: 10
  WEIGHT_DECAY: 1e-4
  WEIGHT_DECAY_BIAS: 1e-4
  BIAS_LR_FACTOR: 2

TEST:
  EVAL: True
  IMS_PER_BATCH: 256
  RE_RANKING: False
  WEIGHT: ''
  NECK_FEAT: 'before'
  FEAT_NORM: 'yes'
  USE_JPM_FUSION: True
  SAVE_BEST: True

OUTPUT_DIR: '../logs/occ_duke_vit_transreid_stride_sem_decoder'
